{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendWise — Register</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card" style="max-width:480px">
    <div class="auth-logo"><i class="fas fa-wallet"></i> Spend<span>Wise</span></div>
    <div class="auth-tagline">Join thousands tracking smarter</div>
    <div class="auth-heading">Create your account</div>

    {% if form.errors %}
    <div class="alert alert-error">
      <i class="fas fa-exclamation-circle"></i>
      {% for field, errors in form.errors.items %}
        {% for e in errors %}{{ e }} {% endfor %}
      {% endfor %}
    </div>
    {% endif %}

    <form method="POST" action="{% url 'register' %}">
      {% csrf_token %}
      <div class="form-group">
        <label><i class="fas fa-id-card"></i> Full Name</label>
        <input type="text" name="full_name" class="form-control" placeholder="Your full name" value="{{ form.full_name.value|default:'' }}" required>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-user"></i> Username</label>
          <input type="text" name="username" class="form-control" placeholder="username" value="{{ form.username.value|default:'' }}" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-envelope"></i> Email</label>
          <input type="email" name="email" class="form-control" placeholder="you@email.com" value="{{ form.email.value|default:'' }}" required>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Password</label>
          <input type="password" name="password1" id="pw1" class="form-control" placeholder="Min 8 characters" required>
        </div>
        <div class="form-group">
          <label><i class="fas fa-lock"></i> Confirm Password</label>
          <input type="password" name="password2" id="pw2" class="form-control" placeholder="Repeat password" required oninput="checkMatch()">
        </div>
      </div>
      <div id="pw-match" style="font-size:0.8rem;margin-bottom:12px;height:18px"></div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">
        <i class="fas fa-rocket"></i> Create Account
      </button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="{% url 'login' %}">Sign in</a>
    </div>
  </div>
</div>
<script>
function checkMatch() {
  const p1 = document.getElementById('pw1').value;
  const p2 = document.getElementById('pw2').value;
  const el = document.getElementById('pw-match');
  if (!p2) { el.textContent = ''; return; }
  if (p1 === p2) {
    el.innerHTML = '<span style="color:var(--income)"><i class="fas fa-check"></i> Passwords match</span>';
  } else {
    el.innerHTML = '<span style="color:var(--expense)"><i class="fas fa-times"></i> Passwords do not match</span>';
  }
}
</script>
</body>
</html>
