{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpendWise — Login</title>
  <link rel="stylesheet" href="{% static 'css/main.css' %}">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo"><i class="fas fa-wallet"></i> Spend<span>Wise</span></div>
    <div class="auth-tagline">Smart Expense Tracking for Better Financial Decisions</div>
    <div class="auth-heading">Welcome back</div>

    {% if error %}
    <div class="alert alert-error"><i class="fas fa-exclamation-circle"></i> {{ error }}</div>
    {% endif %}

    <form method="POST" action="{% url 'login' %}">
      {% csrf_token %}
      <div class="form-group">
        <label><i class="fas fa-user"></i> Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" required autofocus>
      </div>
      <div class="form-group">
        <label><i class="fas fa-lock"></i> Password</label>
        <div style="position:relative">
          <input type="password" name="password" id="pw" class="form-control" placeholder="Enter your password" required style="padding-right:44px">
          <button type="button" onclick="togglePw()" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.9rem">
            <i class="fas fa-eye" id="pw-icon"></i>
          </button>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:20px">
        <input type="checkbox" name="remember_me" id="remember" style="accent-color:var(--accent)">
        <label for="remember" style="font-size:0.875rem;color:var(--text-secondary);cursor:pointer">Remember me</label>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <div class="auth-footer">
      Don't have an account? <a href="{% url 'register' %}">Create one</a>
    </div>
  </div>
</div>
<script>
function togglePw() {
  const pw = document.getElementById('pw');
  const icon = document.getElementById('pw-icon');
  pw.type = pw.type === 'password' ? 'text' : 'password';
  icon.className = pw.type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
}
</script>
</body>
</html>
